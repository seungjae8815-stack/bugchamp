name: app
description: "Bug Champ — 곤충 채집 배틀 게임 (Flutter 앱)."
publish_to: 'none'
# 빌드번호는 빌드일(YYYYMMDD). 앱 내 버전 표기는 lib/app_version.dart 와 맞춘다.
version: 1.0.0+20260719

resolution: workspace

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # 워크스페이스 내부 패키지
  core_models:
    path: ../core_models
  core_battle:
    path: ../core_battle
  core_gathering:
    path: ../core_gathering
  core_run:
    path: ../core_run

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.3.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.6
  uuid: ^4.5.3
  collection: ^1.19.1
  supabase_flutter: ^2.6.0
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4
  google_sign_in: ^7.2.0
  in_app_purchase: ^3.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

# 런처 아이콘 생성: 이미지 교체 후 `dart run flutter_launcher_icons` 재실행.
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#0E1608"
  adaptive_icon_foreground: "assets/icon/app_icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  generate: true   # ARB 기반 다국어 코드 생성 활성화

  assets:
    - assets/data/
    - assets/images/character/
    - assets/images/habitats/
    - assets/images/bosses/
    - assets/images/regions/
    - assets/images/materials/
    - assets/images/upgrades/
    - assets/images/buffs/
    - assets/images/bugs/
    - assets/images/biomes/
    - assets/images/ui/
